name: Deploy to Portainer

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.local.remy.lol
  IMAGE_NAME: arneson.dev

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    environment: prod

    steps:
      - name: Trigger Portainer container redeploy
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/portainer_response.json -w "%{http_code}" \
            -X POST \
            "$PORTAINER_WEBHOOK_URL")

          cat /tmp/portainer_response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Portainer redeploy failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Deployed successfully (HTTP $HTTP_STATUS)"
